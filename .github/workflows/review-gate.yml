name: Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  check-approvals:
    name: Check minimum approvals
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Check minimum approvals
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            const required = 1;

            const owner = context.repo.owner;
            if (pr.user.login === owner) {
              core.info(`Repo owner ${owner} is the PR author — auto-pass`);
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const latestByReviewer = new Map();
            for (const r of reviews) {
              if (r.user.login === pr.user.login) continue;
              latestByReviewer.set(r.user.login, r.state);
            }

            const approvals = [...latestByReviewer.values()]
              .filter((state) => state === 'APPROVED').length;

            if (approvals < required) {
              core.setFailed(
                `Need at least ${required} approval(s), got ${approvals}. ` +
                'Please request a review before merging.'
              );
            } else {
              core.info(`Approval check passed: ${approvals}/${required}`);
            }
